# =============================================================
#  LAPTOP SHOP DATN - Docker Compose Configuration
#  Services: Laravel (PHP-FPM) | Nginx | MySQL | phpMyAdmin | Vue.js
# =============================================================

networks:
  laptop_shop_network:
    driver: bridge

volumes:
  mysql_data:
    driver: local
  phpmyadmin_sessions:
    driver: local
  frontend_node_modules:
    driver: local

services:

  # ─────────────────────────────────────────────
  #  1. PHP-FPM (Laravel Backend)
  # ─────────────────────────────────────────────
  app:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: laptop_shop_app
    restart: unless-stopped
    working_dir: /var/www/backend
    volumes:
      - ./backend:/var/www/backend
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
    networks:
      - laptop_shop_network
    depends_on:
      db:
        condition: service_healthy

  # ─────────────────────────────────────────────
  #  2. Nginx Web Server
  # ─────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: laptop_shop_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./backend:/var/www/backend
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf
    networks:
      - laptop_shop_network
    depends_on:
      - app

  # ─────────────────────────────────────────────
  #  3. MySQL Database
  # ─────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: laptop_shop_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_password_2024
      MYSQL_DATABASE: laptop_shop_db
      MYSQL_USER: laptop_user
      MYSQL_PASSWORD: laptop_password_2024
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_password_2024"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - laptop_shop_network

  # ─────────────────────────────────────────────
  #  4. phpMyAdmin
  # ─────────────────────────────────────────────
  phpmyadmin:
    image: phpmyadmin:5.2
    container_name: laptop_shop_phpmyadmin
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: root_password_2024
      MYSQL_ROOT_PASSWORD: root_password_2024
      PMA_ARBITRARY: 1
      UPLOAD_LIMIT: 300M
    volumes:
      - phpmyadmin_sessions:/sessions
    networks:
      - laptop_shop_network
    depends_on:
      db:
        condition: service_healthy

  # ─────────────────────────────────────────────
  #  5. Vue.js 3 Frontend (Dev Server)
  #  Dung thang image node:20-alpine, khong can build Dockerfile
  #  Container se cho den khi ban tao Vue project ben trong
  # ─────────────────────────────────────────────
  frontend:
    image: node:20-alpine
    container_name: laptop_shop_frontend
    restart: unless-stopped
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    command: >
      sh -c "
        if [ -f package.json ];
        then npm install && npm run dev -- --host 0.0.0.0 --port 5173;
        else echo '=== Frontend chua co project. Vao container chay: npm create vite@latest ===' && tail -f /dev/null;
        fi
      "
    networks:
      - laptop_shop_network