# =============================================================
#  LAPTOP SHOP DATN - Production Docker Compose
#  Dùng: docker compose -f docker-compose.prod.yml up -d
# =============================================================

networks:
  laptop_shop_net:
    driver: bridge

volumes:
  mysql_prod_data:
  storage_data:

services:

  # ─── PHP-FPM (Laravel) ───────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: laptopshop-app:latest
    container_name: laptopshop_app
    restart: unless-stopped
    working_dir: /var/www/backend
    env_file: .env
    volumes:
      # Persist uploaded files
      - storage_data:/var/www/backend/storage/app/public
    networks:
      - laptop_shop_net
    depends_on:
      db:
        condition: service_healthy

  # ─── Nginx ───────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: laptopshop_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/default.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # Chia sẻ storage và frontend dist với nginx
      - storage_data:/var/www/backend/storage/app/public:ro
    networks:
      - laptop_shop_net
    depends_on:
      - app

  # ─── MySQL ───────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: laptopshop_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql_prod_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - laptop_shop_net
    # Không expose port MySQL ra ngoài - bảo mật
