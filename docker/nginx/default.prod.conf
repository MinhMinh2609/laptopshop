server {
    listen 80;
    server_name _;
    charset utf-8;

    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    # Giới hạn upload
    client_max_body_size 50M;

    # ─── Storage: ảnh upload ────────────────────────────
    location ^~ /storage/ {
        alias /var/www/backend/storage/app/public/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ─── API: Laravel PHP-FPM ───────────────────────────
    location ^~ /api {
        root /var/www/backend/public;
        try_files $uri $uri/ @laravel;

        location ~ \.php$ {
            try_files $uri =404;
            fastcgi_split_path_info ^(.+\.php)(/.+)$;
            fastcgi_pass app:9000;
            fastcgi_index index.php;
            include fastcgi_params;
            fastcgi_param SCRIPT_FILENAME /var/www/backend/public/index.php;
            fastcgi_param PATH_INFO $fastcgi_path_info;
            fastcgi_read_timeout 60;
            fastcgi_buffer_size 128k;
            fastcgi_buffers 4 256k;
        }
    }

    location @laravel {
        root /var/www/backend/public;
        fastcgi_pass app:9000;
        fastcgi_param SCRIPT_FILENAME /var/www/backend/public/index.php;
        fastcgi_param PATH_INFO $request_uri;
        include fastcgi_params;
    }

    # VNPay callback (hỗ trợ cả GET và POST)
    location ^~ /payment {
        root /var/www/backend/public;
        try_files $uri $uri/ @laravel;
    }

    # ─── Frontend: Vue.js SPA ───────────────────────────
    location / {
        root /var/www/frontend/dist;
        index index.html;
        try_files $uri $uri/ /index.html;

        # Cache assets có hash trong tên file
        location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|webp|gif|ico)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }
    }

    # ─── Security ────────────────────────────────────────
    location ~ /\.(?!well-known) {
        deny all;
    }

    location ~ /\.(env|git) {
        deny all;
    }
}
