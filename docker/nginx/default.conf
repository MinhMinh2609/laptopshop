server {
    listen 80;
    server_name localhost;

    root /var/www/backend/public;
    index index.php index.html;
    charset utf-8;

    access_log /var/log/nginx/laptop_shop_access.log;
    error_log  /var/log/nginx/laptop_shop_error.log;

    # ─── STORAGE: Serve ảnh upload trực tiếp ─────────────
    # Phải đặt TRƯỚC location / để ưu tiên
    location ^~ /storage/ {
        alias /var/www/backend/storage/app/public/;
        expires 30d;
        add_header Cache-Control "public";
        add_header Access-Control-Allow-Origin "*";
        try_files $uri $uri/ =404;
        # Cho phép các loại ảnh phổ biến
        types {
            image/jpeg  jpg jpeg;
            image/png   png;
            image/webp  webp;
            image/gif   gif;
            image/svg+xml svg;
        }
    }

    # ─── Static Files ──────────────────────────────────────
    location ~* \.(jpg|jpeg|png|gif|ico|svg|webp|css|js|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri $uri/ =404;
    }

    # ─── Laravel Routes ────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ─── PHP-FPM ───────────────────────────────────────────
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_buffer_size 128k;
        fastcgi_buffers 4 256k;
        fastcgi_busy_buffers_size 256k;
        fastcgi_read_timeout 300;
    }

    # ─── Security ──────────────────────────────────────────
    location ~ /\.(?!well-known).* {
        deny all;
    }

    # ─── Health Check ──────────────────────────────────────
    location /health {
        access_log off;
        return 200 "OK";
        add_header Content-Type text/plain;
    }
}